[project]
name = "devmanager-agents"
version = "0.1.0"
license = "MIT"
description = "Agent review pipeline for DevManager"
requires-python = ">=3.12"
dependencies = [
    "devmanager-domain",
    "devmanager-db",
    "devmanager-llm",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
devmanager-domain = { workspace = true }
devmanager-db = { workspace = true }
devmanager-llm = { workspace = true }
