[project]
name = "devmanager-db"
version = "0.1.0"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "pgvector>=0.4",
    "jsonschema>=4.22",
    "cryptography>=42.0",
    "devmanager-domain",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["devmanager_db"]

[tool.uv.sources]
devmanager-domain = { workspace = true }
