services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: devmanager
      POSTGRES_USER: devmanager
      POSTGRES_PASSWORD: devmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmanager -d devmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: arq worker.main.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://devmanager:devmanager@postgres:5432/devmanager
      REDIS_URL: redis://redis:6379
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
